<div class="page-header">
  <div class="header-info">
    <h1>{{ title }}</h1>
    <p class="text-secondary" *ngIf="subtitle">{{ subtitle }}</p>
  </div>
  <div class="header-actions">
    <ng-content></ng-content>
    <button class="btn btn-primary" *ngIf="showAction && actionLabel" (click)="action.emit()">
      <span class="material-icons">{{ actionIcon }}</span>
      {{ actionLabel }}
    </button>
  </div>
</div>
