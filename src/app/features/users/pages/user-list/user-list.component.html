<div class="list-page">
  <app-page-header title="Users" subtitle="Manage system users">
    <button mat-raised-button color="primary" (click)="onNew()" *ngIf="canCreate">
      <mat-icon>add</mat-icon> New User
    </button>
  </app-page-header>

  <div class="card">
    <div class="card-body table-responsive" *ngIf="!isLoading">
      <table class="data-table" *ngIf="users.length > 0">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Role</th>
            <th>Status</th>
            <th>Created</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of users" class="clickable" (click)="onView(u)">
            <td>
              <div class="cell-with-avatar">
                <div class="avatar avatar-sm">{{ u.fullName | initials }}</div>
                <span>{{ u.fullName }}</span>
              </div>
            </td>
            <td>{{ u.email }}</td>
            <td>{{ u.phone || '—' }}</td>
            <td>{{ u.roleName || '—' }}</td>
            <td>
              <span class="badge" [class.badge-success]="u.isActive" [class.badge-danger]="!u.isActive">
                {{ u.isActive ? 'Active' : 'Inactive' }}
              </span>
            </td>
            <td>{{ u.createdAt | date:'MMM d, y' }}</td>
            <td class="text-right actions-cell" (click)="$event.stopPropagation()">
              <button mat-icon-button (click)="onEdit(u)" *ngIf="canUpdate" matTooltip="Edit"><mat-icon>edit</mat-icon></button>
              <button mat-icon-button color="warn" (click)="onDelete(u)" *ngIf="canDelete" matTooltip="Delete"><mat-icon>delete</mat-icon></button>
            </td>
          </tr>
        </tbody>
      </table>

      <app-empty-state *ngIf="users.length === 0" icon="person_off" title="No users found" message="No users have been added yet."
        [actionLabel]="canCreate ? 'Add User' : ''" (action)="onNew()">
      </app-empty-state>
    </div>

    <div class="card-body loading-state" *ngIf="isLoading"><mat-spinner diameter="40"></mat-spinner></div>

    <div class="pagination" *ngIf="totalPages > 1">
      <button mat-icon-button [disabled]="page === 1" (click)="onPageChange(page - 1)"><mat-icon>chevron_left</mat-icon></button>
      <span class="page-info">Page {{ page }} of {{ totalPages }}</span>
      <button mat-icon-button [disabled]="page === totalPages" (click)="onPageChange(page + 1)"><mat-icon>chevron_right</mat-icon></button>
    </div>
  </div>
</div>
