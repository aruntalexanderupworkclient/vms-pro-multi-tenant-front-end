<div class="settings-card card" *ngIf="!isLoading">
  <div class="card-body">
    <h3 class="card-title">General Settings</h3>

    <div class="form-grid">
      <!-- Company Name -->
      <div class="form-group">
        <label class="form-label">Company Name</label>
        <input type="text" class="form-control" [(ngModel)]="settings.companyName" />
      </div>

      <!-- Timezone -->
      <div class="form-group">
        <label class="form-label">Timezone</label>
        <input type="text" class="form-control" [(ngModel)]="settings.timezone" />
      </div>

      <!-- Date Format -->
      <div class="form-group">
        <label class="form-label">Date Format</label>
        <select class="form-control" [(ngModel)]="settings.dateFormat">
          <option *ngFor="let fmt of dateFormats" [value]="fmt">{{ fmt }}</option>
        </select>
      </div>

      <!-- Language -->
      <div class="form-group">
        <label class="form-label">Language</label>
        <select class="form-control" [(ngModel)]="settings.language">
          <option *ngFor="let lang of languages" [value]="lang">{{ lang }}</option>
        </select>
      </div>

      <!-- Auto Check-out -->
      <div class="form-group">
        <label class="form-label">Auto Check-out (hours)</label>
        <input type="number" class="form-control" [(ngModel)]="settings.autoCheckoutHours" min="1" />
      </div>
    </div>

    <button class="btn btn-primary save-btn" (click)="onSave()" [disabled]="isSaving">
      {{ isSaving ? 'Saving...' : 'Save Changes' }}
    </button>
  </div>
</div>

<div class="loading-state" *ngIf="isLoading">
  <mat-spinner diameter="40"></mat-spinner>
</div>
