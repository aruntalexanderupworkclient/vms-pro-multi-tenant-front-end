<div class="form-page">
  <app-page-header [title]="isEditMode ? 'Edit Role' : 'New Role'" [subtitle]="isEditMode ? 'Update role details' : 'Create a new role'"></app-page-header>
  <div class="card" *ngIf="!isLoading">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Role Name *</mat-label>
            <input matInput formControlName="name" placeholder="e.g., Manager" />
            <mat-error>Required (min 2 chars)</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Description</mat-label>
            <input matInput formControlName="description" />
          </mat-form-field>
          <div class="form-checks">
            <mat-checkbox formControlName="isAdmin" color="primary">Is Admin</mat-checkbox>
            <mat-checkbox formControlName="isActive" color="primary" *ngIf="isEditMode">Active</mat-checkbox>
          </div>
        </div>
        <div class="form-actions">
          <button mat-button type="button" (click)="onCancel()">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="isSaving">
            {{ isSaving ? 'Saving...' : (isEditMode ? 'Update Role' : 'Create Role') }}
          </button>
        </div>
      </form>
    </div>
  </div>
  <div class="loading-state" *ngIf="isLoading"><mat-spinner diameter="40"></mat-spinner></div>
</div>
