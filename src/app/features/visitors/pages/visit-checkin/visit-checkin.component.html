<div class="checkin-page" *ngIf="!isLoading && visit">
  <app-page-header title="Check In" [subtitle]="'Checking in: ' + visit.visitorName"></app-page-header>

  <div class="card">
    <div class="card-body">
      <div class="visit-summary">
        <div class="summary-item"><strong>Visitor:</strong> {{ visit.visitorName }}</div>
        <div class="summary-item"><strong>Host:</strong> {{ visit.hostName }}</div>
        <div class="summary-item"><strong>Scheduled:</strong> {{ visit.scheduledDateTime | date:'MMM d, y h:mm a' }}</div>
      </div>

      <form [formGroup]="form" (ngSubmit)="onCheckIn()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Access Card Number (optional)</mat-label>
          <input matInput formControlName="accessCardNumber" placeholder="e.g., AC-12345" />
          <mat-icon matPrefix>credit_card</mat-icon>
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" (click)="onCancel()">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="isSaving">
            <mat-icon>login</mat-icon> {{ isSaving ? 'Processing...' : 'Confirm Check In' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="loading-state" *ngIf="isLoading"><mat-spinner diameter="40"></mat-spinner></div>
