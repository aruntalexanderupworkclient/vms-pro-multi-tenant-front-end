<div class="list-page">
  <app-page-header title="Visit Schedule" subtitle="Manage all visitor visits">
    <button mat-raised-button color="primary" (click)="onNew()" *ngIf="canCreate">
      <mat-icon>add</mat-icon> New Visit
    </button>
  </app-page-header>

  <div class="card">
    <div class="card-body table-responsive" *ngIf="!isLoading">
      <table class="data-table" *ngIf="visits.length > 0">
        <thead>
          <tr>
            <th>Visitor</th>
            <th>Host</th>
            <th>Location</th>
            <th>Purpose</th>
            <th>Status</th>
            <th>Scheduled</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let v of visits" class="clickable" (click)="onView(v)">
            <td>{{ v.visitorName }}</td>
            <td>{{ v.hostName }}</td>
            <td>{{ v.locationName || '—' }}</td>
            <td>{{ v.purpose | truncate:25 }}</td>
            <td><app-status-badge [status]="v.status"></app-status-badge></td>
            <td>{{ v.scheduledDateTime | date:'MMM d, y h:mm a' }}</td>
            <td class="text-right actions-cell" (click)="$event.stopPropagation()">
              <button mat-icon-button (click)="onCheckIn(v)" *ngIf="canUpdate && v.status === 'Scheduled'" matTooltip="Check In">
                <mat-icon>login</mat-icon>
              </button>
              <button mat-icon-button (click)="onCheckOut(v)" *ngIf="canUpdate && v.status === 'CheckedIn'" matTooltip="Check Out">
                <mat-icon>logout</mat-icon>
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <app-empty-state *ngIf="visits.length === 0"
        icon="event_busy" title="No visits found"
        message="No visits have been scheduled yet."
        [actionLabel]="canCreate ? 'Schedule Visit' : ''"
        (action)="onNew()">
      </app-empty-state>
    </div>

    <div class="card-body loading-state" *ngIf="isLoading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div class="pagination" *ngIf="totalPages > 1">
      <button mat-icon-button [disabled]="page === 1" (click)="onPageChange(page - 1)"><mat-icon>chevron_left</mat-icon></button>
      <span class="page-info">Page {{ page }} of {{ totalPages }}</span>
      <button mat-icon-button [disabled]="page === totalPages" (click)="onPageChange(page + 1)"><mat-icon>chevron_right</mat-icon></button>
    </div>
  </div>
</div>
