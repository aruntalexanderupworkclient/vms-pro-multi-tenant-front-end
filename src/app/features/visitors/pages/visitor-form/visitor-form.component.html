<div class="form-page">
  <app-page-header [title]="isEditMode ? 'Edit Visitor' : 'New Visitor'"
    [subtitle]="isEditMode ? 'Update visitor information' : 'Register a new visitor'">
  </app-page-header>

  <div class="card" *ngIf="!isLoading">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Full Name *</mat-label>
            <input matInput formControlName="fullName" placeholder="John Doe" />
            <mat-error *ngIf="form.get('fullName')?.hasError('required')">Required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="email" placeholder="visitor@company.com" />
            <mat-error *ngIf="form.get('email')?.hasError('email')">Invalid email</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Phone</mat-label>
            <input matInput formControlName="phone" placeholder="+1234567890" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Company</mat-label>
            <input matInput formControlName="company" placeholder="Acme Corp" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>ID Proof Type</mat-label>
            <mat-select formControlName="idProofType">
              <mat-option value="">None</mat-option>
              <mat-option value="Passport">Passport</mat-option>
              <mat-option value="NationalId">National ID</mat-option>
              <mat-option value="DrivingLicense">Driving License</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>ID Proof Number</mat-label>
            <input matInput formControlName="idProofNumber" />
          </mat-form-field>

          <div class="form-field-full" *ngIf="isEditMode">
            <mat-checkbox formControlName="isBlacklisted" color="warn">Blacklisted</mat-checkbox>
          </div>
        </div>

        <div class="form-actions">
          <button mat-button type="button" (click)="onCancel()">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="isSaving">
            <mat-spinner diameter="18" *ngIf="isSaving" class="inline-spinner"></mat-spinner>
            {{ isSaving ? 'Saving...' : (isEditMode ? 'Update Visitor' : 'Create Visitor') }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="loading-state" *ngIf="isLoading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
</div>
